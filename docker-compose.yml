version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crudeflow-backend
    env_file:
      - .env.example
    environment:
      - APP_ENV=development
      - API_V1_PREFIX=/api/v1
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crudeflow-frontend
    depends_on:
      - backend
    environment:
      - PORT=3000
      - CRUDEFLOW_BACKEND_ORIGIN=http://backend:8000
      - NEXT_PUBLIC_API_URL=/api/v1
      - NEXT_PUBLIC_API_WS_URL=/ws
    ports:
      - "3000:3000"

